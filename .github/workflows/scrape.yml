name: Scrape Portland-area Procurement

on:
  schedule:
    # Run at 7am and 4pm Pacific (14:00 and 23:00 UTC) on weekdays
    - cron: '0 14 * * 1-5'
    - cron: '0 23 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      LOCALIZER_SMTP_HOST: ${{ secrets.LOCALIZER_SMTP_HOST }}
      LOCALIZER_SMTP_PORT: ${{ secrets.LOCALIZER_SMTP_PORT }}
      LOCALIZER_SMTP_USER: ${{ secrets.LOCALIZER_SMTP_USER }}
      LOCALIZER_SMTP_PASS: ${{ secrets.LOCALIZER_SMTP_PASS }}
      LOCALIZER_EMAIL_TO: ${{ secrets.LOCALIZER_EMAIL_TO }}
      LOCALIZER_EMAIL_FROM: ${{ secrets.LOCALIZER_EMAIL_FROM }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Download previous database
        uses: actions/cache@v4
        with:
          path: data/rfps.db
          key: rfp-db-${{ github.run_id }}
          restore-keys: |
            rfp-db-

      - name: Run scrapers
        run: |
          mkdir -p data
          localizer --db data/rfps.db scrape 2>&1 | tee data/scrape.log

      - name: Generate and email digest
        run: |
          localizer --db data/rfps.db digest --email 2>&1 | tee data/latest-digest.txt
          localizer --db data/rfps.db new --days 1 >> data/latest-digest.txt 2>&1 || true

      - name: Build static dashboard
        run: localizer --db data/rfps.db build --output dist

      - name: Show scrape history
        run: localizer --db data/rfps.db history

      - name: Upload database as artifact
        uses: actions/upload-artifact@v4
        with:
          name: rfp-database-${{ github.run_id }}
          path: data/rfps.db
          retention-days: 90

      - name: Upload dashboard as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-${{ github.run_id }}
          path: dist/
          retention-days: 30

      - name: Commit database and dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rfps.db data/scrape.log data/latest-digest.txt dist/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update procurement database and dashboard $(date -u +%Y-%m-%d)"
          git push
